name: ksl
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.10.0-75.1.beta

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.2
  http: ^1.2.2
  shared_preferences: ^2.3.4
  intl: ^0.20.2
  image_picker: ^1.2.1
  fl_chart: ^0.70.0
  cached_network_image: ^3.4.1
  youtube_player_flutter: ^9.1.3
